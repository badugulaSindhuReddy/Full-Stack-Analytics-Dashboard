<!DOCTYPE html>
<html>
<head>
  <title>Analytics Dashboard</title>
</head>
<body>
  <h1>Analytics Dashboard</h1>
  <div id="data"></div>

  <script>
    fetch("http://localhost:8080/api/data")
      .then(res => res.json())
      .then(data => {
        document.getElementById("data").innerHTML = JSON.stringify(data);
      });
  </script>
</body>
</html>
